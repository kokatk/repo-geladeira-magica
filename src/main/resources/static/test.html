<!DOCTYPE html>
<html>
<head>
    <title>Teste API</title>
</head>
<body>
    <h1>Teste de Comunicação com API</h1>
    <button onclick="testarAPI()">Testar API</button>
    <div id="resultado"></div>
    
    <script>
        async function testarAPI() {
            try {
                console.log('Testando API...');
                const response = await fetch('http://localhost:8080/food/listar');
                console.log('Response:', response);
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const data = await response.json();
                console.log('Data:', data);
                
                document.getElementById('resultado').innerHTML = 
                    '<h2>Sucesso!</h2><pre>' + JSON.stringify(data, null, 2) + '</pre>';
            } catch (error) {
                console.error('Erro:', error);
                document.getElementById('resultado').innerHTML = 
                    '<h2>Erro:</h2><p>' + error.message + '</p>';
            }
        }
    </script>
</body>
</html>
