version: "3.9"
services:
  postgres:
    image: postgres:15
    container_name: postgres_geladeira
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 6
    environment:
      - POSTGRES_DB=geladeira
      - POSTGRES_USER=geladeira
      - POSTGRES_PASSWORD=geladeira123
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "192.168.3.3:5433:5432"
    networks:
      - geladeira_net

  redis:
    image: redis:7
    container_name: redis_geladeira
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 6
    volumes:
      - redisdata:/data
    ports:
      - "192.168.3.3:6380:6379"
    networks:
      - geladeira_net

  sonarqube:
    image: sonarqube:community
    container_name: sonarqube_geladeira
    restart: unless-stopped
    profiles:
      - devops
    ports:
      - "192.168.3.3:9001:9000"
    environment:
      - SONAR_ES_BOOTSTRAP_CHECKS_DISABLE=true
    volumes:
      - sonardata:/opt/sonarqube/data
      - sonarext:/opt/sonarqube/extensions
      - sonarlogs:/opt/sonarqube/logs
    networks:
      - geladeira_net

  nexus:
    image: sonatype/nexus3
    container_name: nexus_geladeira
    restart: unless-stopped
    profiles:
      - devops
    ports:
      - "192.168.3.3:8082:8081"
    volumes:
      - nexusdata:/nexus-data
    networks:
      - geladeira_net

  geladeira-magica:
    container_name: geladeira-magica
    build:
      context: .
      dockerfile: Dockerfile.mvn
    image: geladeira-magica:latest
    environment:
      - TZ=America/Sao_Paulo
      - JAVA_OPTS=-Xms256m -Xmx512m
      - API_URL=https://api.openai.com/v1/chat/completions
      - API_KEY=change-me
      - OPENAI_API_KEY=change-me
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/geladeira
      - SPRING_DATASOURCE_USERNAME=geladeira
      - SPRING_DATASOURCE_PASSWORD=geladeira123
      - SPRING_DATASOURCE_DRIVER_CLASS_NAME=org.postgresql.Driver
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_DATA_REDIS_PORT=6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "192.168.3.3:8085:8080"
    restart: unless-stopped
    networks:
      - geladeira_net

networks:
  geladeira_net:
    driver: bridge

volumes:
  pgdata:
  redisdata:
  sonardata:
  sonarext:
  sonarlogs:
  nexusdata:
