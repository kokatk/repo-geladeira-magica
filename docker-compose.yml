services:
  postgres:
    image: postgres:15
    container_name: postgres_geladeira
    restart: unless-stopped
    environment:
      - POSTGRES_DB=geladeira
      - POSTGRES_USER=geladeira
      - POSTGRES_PASSWORD=geladeira123
    volumes:
      - /DATA/AppData/geladeira-devops/postgres:/var/lib/postgresql/data
    ports:
      - "192.168.3.3:5433:5432"
    networks:
      - geladeira_net

  redis:
    image: redis:7
    container_name: redis_geladeira
    restart: unless-stopped
    volumes:
      - /DATA/AppData/geladeira-devops/redis:/data
    ports:
      - "192.168.3.3:6380:6379"
    networks:
      - geladeira_net

  sonarqube:
    image: sonarqube:community
    container_name: sonarqube_geladeira
    restart: unless-stopped
    ports:
      - "192.168.3.3:9001:9000"
    environment:
      - SONAR_ES_BOOTSTRAP_CHECKS_DISABLE=true
    volumes:
      - /DATA/AppData/geladeira-devops/sonarqube/data:/opt/sonarqube/data
      - /DATA/AppData/geladeira-devops/sonarqube/extensions:/opt/sonarqube/extensions
      - /DATA/AppData/geladeira-devops/sonarqube/logs:/opt/sonarqube/logs
    networks:
      - geladeira_net

  nexus:
    image: sonatype/nexus3
    container_name: nexus_geladeira
    restart: unless-stopped
    ports:
      - "192.168.3.3:8082:8081"
    volumes:
      - /DATA/AppData/geladeira-devops/nexus:/nexus-data
    networks:
      - geladeira_net

  geladeira-magica:
    container_name: geladeira-magica
    build:
      context: .
      dockerfile: Dockerfile.mvn
    image: geladeira-magica:latest
    environment:
      - TZ=America/Sao_Paulo
      - JAVA_OPTS=-Xms256m -Xmx512m
      - API_URL=https://api.openai.com/v1/chat/completions
      - API_KEY=change-me
      - OPENAI_API_KEY=change-me
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/geladeira
      - SPRING_DATASOURCE_USERNAME=geladeira
      - SPRING_DATASOURCE_PASSWORD=geladeira123
      - SPRING_DATASOURCE_DRIVER_CLASS_NAME=org.postgresql.Driver
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_DATA_REDIS_PORT=6379
    depends_on:
      - postgres
      - redis
    ports:
      - "192.168.3.3:8085:8080"
    restart: unless-stopped
    networks:
      - geladeira_net

networks:
  geladeira_net:
    driver: bridge
