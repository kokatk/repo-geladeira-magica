version: "3.9"
services:
  postgres:
    image: postgres:15
    container_name: postgres_geladeira
    restart: unless-stopped
    environment:
      POSTGRES_DB: geladeira
      POSTGRES_USER: geladeira
      POSTGRES_PASSWORD: geladeira123
    volumes:
      - /DATA/AppData/geladeira-devops/postgres:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    networks:
      - geladeira_net

  redis:
    image: redis:7
    container_name: redis_geladeira
    restart: unless-stopped
    volumes:
      - /DATA/AppData/geladeira-devops/redis:/data
    ports:
      - "6380:6379"
    networks:
      - geladeira_net

  sonarqube:
    image: sonarqube:community
    container_name: sonarqube_geladeira
    restart: unless-stopped
    ports:
      - "9001:9000"
    volumes:
      - /DATA/AppData/geladeira-devops/sonarqube/data:/opt/sonarqube/data
      - /DATA/AppData/geladeira-devops/sonarqube/extensions:/opt/sonarqube/extensions
      - /DATA/AppData/geladeira-devops/sonarqube/logs:/opt/sonarqube/logs
    environment:
      SONAR_ES_BOOTSTRAP_CHECKS_DISABLE: "true"
    networks:
      - geladeira_net

  nexus:
    image: sonatype/nexus3
    container_name: nexus_geladeira
    restart: unless-stopped
    ports:
      - "8082:8081"
    volumes:
      - /DATA/AppData/geladeira-devops/nexus:/nexus-data
    networks:
      - geladeira_net

  app:
    image: eclipse-temurin:21-jdk
    container_name: geladeira_app
    restart: unless-stopped
    volumes:
      - /DATA/AppData/geladeira-devops/app:/app
    working_dir: /app
    command: ["java","-jar","app.jar"]
    ports:
      - "8085:8080"
    depends_on:
      - postgres
      - redis
    networks:
      - geladeira_net

networks:
  geladeira_net:
    driver: bridge
